<div class="answers-container min-w-lg m-3 flex flex-col gap-2">
    <div class="answer-row flex gap-2 w-full h-10" *ngFor="let attempt of attempts">
        <div class="price-pill z-10 text-md font-bold overflow-hidden whitespace-nowrap flex-1 rounded-xl shadow-md flex items-center justify-center" 
            [class.filled]="attempt.priceGuess !== null">
            <span>
                <ng-container *ngIf="attempt.result === 0 && attempt.priceExact === attempt.priceGuess">
                    {{ attempt.priceGuess }} zł
                </ng-container>

                <ng-container *ngIf="attempt.result === 0 && attempt.priceExact !== attempt.priceGuess">
                    {{ attempt.priceGuess }} zł → {{ attempt.priceExact }} zł
                </ng-container>

                <ng-container *ngIf="attempt.result !== 0">
                    {{ attempt.priceGuess ? attempt.priceGuess + ' zł' : '' }}
                </ng-container>
            </span>
        </div>

        <div class="status-indicator rounded-xl flex items-center justify-center shadow-md" [ngClass]="getStatusClass(attempt.result)">          
            <svg *ngIf="attempt.result !== null && attempt.result > 0" class="arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
            </svg>
            
            <svg *ngIf="attempt.result !== null && attempt.result < 0" class="arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 10l7-7m0 0l7 7m-7-7v18" />
            </svg>

            <svg *ngIf="attempt.result !== null && attempt.result === 0" class="arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.921-.755 1.688-1.54 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.784.57-1.838-.197-1.539-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
            </svg>
        </div>
    </div>
</div>
