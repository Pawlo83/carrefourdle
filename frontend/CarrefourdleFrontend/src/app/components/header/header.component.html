<header class="flex flex-col rounded-b-xl items-center bg-white shadow-sm mb-2">
  <div class="flex bg-white p-1 rounded-xl w-64 min-w-lg">
    <button (click)="setMode('daily')"
            [class]="currentMode === 'daily' 
              ? 'flex-1 bg-blue-800 text-white shadow-sm rounded-lg py-2 mr-1 font-bold transition-all' 
              : 'flex-1 text-slate-500 hover:text-slate-700 py-2 font-bold transition-all'">
      Daily
    </button>
    
    <button (click)="setMode('random')"
            [class]="currentMode === 'random' 
              ? 'flex-1 bg-red-800 text-white shadow-sm rounded-lg py-2 ml-1 font-bold transition-all' 
              : 'flex-1 text-slate-500 hover:text-slate-700 py-2 font-bold transition-all'">
      Random
    </button>
  </div>
</header>
