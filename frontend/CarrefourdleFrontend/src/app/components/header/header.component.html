<header class="flex flex-row rounded-b-xl items-center bg-white shadow-sm mb-2 p-1 w-full">
    <button (click)="openHelp.emit()" 
            class="w-10 h-10 rounded-full bg-slate-100 text-slate-500 font-bold text-xl hover:bg-slate-200 hover:text-slate-700 transition-all flex items-center justify-center">
      ?
    </button>
    
    <button (click)="setMode('DAILY')"
            [class]="currentMode === 'DAILY' 
              ? 'flex-1 bg-blue-800 text-white shadow-md rounded-xl py-2 mr-1 font-bold transition-all' 
              : 'flex-1 text-slate-500 hover:text-slate-700 py-2 font-bold transition-all'">
      Daily
    </button>
    
    <button (click)="setMode('RANDOM')"
            [class]="currentMode === 'RANDOM' 
              ? 'flex-1 bg-red-800 text-white shadow-md rounded-xl py-2 ml-1 font-bold transition-all' 
              : 'flex-1 text-slate-500 hover:text-slate-700 py-2 font-bold transition-all'">
      Random
    </button>

    <button (click)="openStats.emit()" 
            class="w-10 h-10 rounded-full bg-slate-100 text-slate-500 font-bold hover:bg-slate-200 hover:text-slate-700 transition-all flex items-center justify-center">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path d="M4 20h16v2H4zM6 10h4v10H6zm5-6h4v16h-4zm5 9h4v7h-4z"/>
      </svg>
    </button>
</header>
