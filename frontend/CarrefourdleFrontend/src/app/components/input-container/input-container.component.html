<div class="input-container min-w-lg m-2 flex gap-2 h-10 text-lg font-semibold" [class.locked]="disabled">
    <input #priceInput type="number" step="0.1" placeholder="0.00" [disabled]="disabled"
        class="main-input shadow-md w-full h-full rounded-xl px-5" 
        (keydown.enter)="submit(priceInput.value); priceInput.value=''">
    <button [disabled]="disabled"
        class="submit-btn cursor-pointer rounded-xl" 
        (click)="submit(priceInput.value); priceInput.value=''"> 
    <span>ZAGADNIJ</span>
    </button>
</div>
